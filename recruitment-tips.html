<section id="recruitment-section" class="py-24 px-6 md:px-16">
  <div class="max-w-6xl mx-auto">
    <div class="text-center reveal">
      <div class="section-label">Career Guide</div>
      <h2 class="section-title">Recruitment Tips</h2>
      <p class="section-subtitle mx-auto">
        Essential strategies and insights to help you land your dream role in Human Resource Management.
      </p>
    </div>

    <!-- View Toggle -->
    <div class="flipbook-toggle-wrapper reveal reveal-delay-1">
      <div class="flipbook-toggle">
        <button class="toggle-btn active" data-view="flipbook" id="btnFlipbook">
          <i data-lucide="book-open" class="w-4 h-4"></i>
          <span>Flipbook</span>
        </button>
        <button class="toggle-btn" data-view="single" id="btnSingle">
          <i data-lucide="file-text" class="w-4 h-4"></i>
          <span>Single Page</span>
        </button>
      </div>
    </div>

    <!-- FlipBook View (Default) -->
    <div class="flipbook-wrapper reveal reveal-delay-1" id="flipbookView">
      <div class="flipbook" id="flipbook">
        <!-- Page 1: Cover (0.png) / Back (1.png) -->
        <div class="flip-page">
          <div class="flip-front" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/0.png" alt="Cover" style="width:100%; height:100%; object-fit:cover; border-radius:0.3em 0.8em 0.8em 0.3em; display:block;">
          </div>
          <div class="flip-back" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/1.png" alt="Page 1" style="width:100%; height:100%; object-fit:cover; border-radius:0.8em 0.3em 0.3em 0.8em; display:block;">
          </div>
        </div>
        <!-- Page 2: Front (2.png) / Back (3.png) -->
        <div class="flip-page">
          <div class="flip-front" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/2.png" alt="Page 2" style="width:100%; height:100%; object-fit:cover; border-radius:0.3em 0.8em 0.8em 0.3em; display:block;">
          </div>
          <div class="flip-back" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/3.png" alt="Page 2 Back" style="width:100%; height:100%; object-fit:cover; border-radius:0.8em 0.3em 0.3em 0.8em; display:block;">
          </div>
        </div>
        <!-- Page 3: Front (4.png) / Back (5.png) -->
        <div class="flip-page">
          <div class="flip-front" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/4.png" alt="Page 3" style="width:100%; height:100%; object-fit:cover; border-radius:0.3em 0.8em 0.8em 0.3em; display:block;">
          </div>
          <div class="flip-back" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/5.png" alt="Page 3 Back" style="width:100%; height:100%; object-fit:cover; border-radius:0.8em 0.3em 0.3em 0.8em; display:block;">
          </div>
        </div>
        <!-- Page 4: Front (6.png) / Back (7.png) -->
        <div class="flip-page">
          <div class="flip-front" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/6.png" alt="Page 4" style="width:100%; height:100%; object-fit:cover; border-radius:0.3em 0.8em 0.8em 0.3em; display:block;">
          </div>
          <div class="flip-back" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/7.png" alt="Page 4 Back" style="width:100%; height:100%; object-fit:cover; border-radius:0.8em 0.3em 0.3em 0.8em; display:block;">
          </div>
        </div>
        <!-- Page 5: Front (8.png) / Back Cover (9.png) -->
        <div class="flip-page">
          <div class="flip-front" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/8.png" alt="Page 5" style="width:100%; height:100%; object-fit:cover; border-radius:0.3em 0.8em 0.8em 0.3em; display:block;">
          </div>
          <div class="flip-back" style="background:#ffffff; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0;">
            <img src="public/9.png" alt="Back Cover" style="width:100%; height:100%; object-fit:cover; border-radius:0.8em 0.3em 0.3em 0.8em; display:block;">
          </div>
        </div>
      </div>
    </div>

    <!-- Single Page View (Hidden by default) -->
    <div class="single-page-wrapper reveal reveal-delay-1 hidden" id="singlePageView">
      <div class="single-page-container">
        <button class="single-nav single-nav-prev" id="singlePrev" aria-label="Previous page">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        
        <div class="single-page-display" id="singlePageDisplay">
          <img src="public/0.png" alt="Page 1" id="singlePageImg">
          <div class="single-page-number" id="singlePageNum">1 / 10</div>
        </div>
        
        <button class="single-nav single-nav-next" id="singleNext" aria-label="Next page">
          <i data-lucide="chevron-right" class="w-6 h-6"></i>
        </button>
      </div>
      
      <!-- Page thumbnails for quick navigation -->
      <div class="single-page-thumbnails" id="singleThumbnails">
        <button class="thumb-btn active" data-page="0">
          <img src="public/0.png" alt="Page 1">
        </button>
        <button class="thumb-btn" data-page="1">
          <img src="public/1.png" alt="Page 2">
        </button>
        <button class="thumb-btn" data-page="2">
          <img src="public/2.png" alt="Page 3">
        </button>
        <button class="thumb-btn" data-page="3">
          <img src="public/3.png" alt="Page 4">
        </button>
        <button class="thumb-btn" data-page="4">
          <img src="public/4.png" alt="Page 5">
        </button>
        <button class="thumb-btn" data-page="5">
          <img src="public/5.png" alt="Page 6">
        </button>
        <button class="thumb-btn" data-page="6">
          <img src="public/6.png" alt="Page 7">
        </button>
        <button class="thumb-btn" data-page="7">
          <img src="public/7.png" alt="Page 8">
        </button>
        <button class="thumb-btn" data-page="8">
          <img src="public/8.png" alt="Page 9">
        </button>
        <button class="thumb-btn" data-page="9">
          <img src="public/9.png" alt="Page 10">
        </button>
      </div>
    </div>
  </div>
</section>
