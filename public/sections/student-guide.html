<section id="student-guide-section" class="py-24 px-6 md:px-16">
  <div class="max-w-6xl mx-auto">
    <div class="text-center reveal">
      <div class="section-label">Resources</div>
      <h2 class="section-title">Student Guide</h2>
      <p class="section-subtitle mx-auto">
        Food Industry Career & OJT Readiness Guide — Everything you need to land your role in Valenzuela's thriving food manufacturing sector.
      </p>
    </div>

    <!-- Tri-Fold Brochure -->
    <div class="brochure-wrapper reveal reveal-delay-1">
      <div class="brochure-header">
        <i data-lucide="hand-click" class="w-5 h-5"></i>
        <span>Click the brochure to unfold it</span>
      </div>

      <div class="tri-fold-container" id="triFoldBrochure">
        <!-- Left Panel (folds right, front cover) -->
        <div class="tf-left">
          <div class="tf-front">
            <img src="public/brochure1/2.png" alt="Front Cover" loading="lazy">
          </div>
          <div class="tf-back">
            <img src="public/brochure1/0.png" alt="Inside Left" loading="lazy">
          </div>
        </div>

        <!-- Center Panel (fixed) -->
        <div class="tf-center">
          <div class="tf-center-content">
            <img src="public/brochure1/3.png" alt="Inside Center" loading="lazy">
          </div>
        </div>

        <!-- Right Panel (folds left, back cover) -->
        <div class="tf-right">
          <div class="tf-front">
            <img src="public/brochure1/4.png" alt="Back Cover" loading="lazy">
          </div>
          <div class="tf-back">
            <img src="public/brochure1/1.png" alt="Inside Right" loading="lazy">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
