<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRM Interactive Showcase — Shape the Future of Work</title>
  <meta name="description" content="Discover a career in Human Resource Management. Explore programs, career paths, and student success stories.">
  
  <!-- External Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700;900&display=swap" rel="stylesheet">
  
  <!-- Your Styles -->
  <link rel="stylesheet" href="styles/styles.css">
  
  <base target="_blank">
</head>
<body class="w-full animated-gradient min-h-screen">

  <!-- Sections will be loaded here -->
  <div id="nav-container"></div>
  
  <header id="hero-container"></header>
  
  <main>
    <div id="enterprise-container"></div>
    <div id="why-hrm-container"></div>
    <div id="career-paths-container"></div>
    <div id="student-stories-container"></div>
    <div id="curriculum-container"></div>
    <div id="program-materials-container"></div>
    <div id="future-trends-container"></div>
    <div id="recruitment-tips-container"></div>
    <div id="student-guide-container"></div>
    <div id="food-companies-container"></div>
  </main>
  
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="scripts/scripts.js"></script>
  
  <!-- Section Loader -->
  <script>
    async function loadSection(containerId, filePath) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`Failed to load ${filePath}`);
        const html = await response.text();
        container.innerHTML = html;
        
        // Re-initialize Lucide icons for newly loaded content
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      } catch (err) {
        console.error('Error loading section:', err);
        container.innerHTML = `<p style="padding:2rem;text-align:center;color:#ef4444;">Error loading section. Please refresh.</p>`;
      }
    }

    // Load all sections
    document.addEventListener('DOMContentLoaded', () => {
      const sections = [
        ['nav-container', 'nav.html'],
        ['hero-container', 'hero.html'],
        ['enterprise-container', 'enterprise.html'],
        ['why-hrm-container', 'why-hrm.html'],
        ['career-paths-container', 'career-paths.html'],
        ['student-stories-container', 'student-stories.html'],
        ['curriculum-container', 'curriculum.html'],
        ['program-materials-container', 'program-materials.html'],
        ['future-trends-container', 'future-trends.html'],
        ['recruitment-tips-container', 'recruitment-tips.html'],
        ['student-guide-container', 'student-guide.html'],
        ['food-companies-container', 'food-companies.html'],
        ['footer-container', 'footer.html']
      ];

      // Load all sections in parallel
      Promise.all(sections.map(([id, path]) => loadSection(id, path)))
        .then(() => {
          // After all sections load, re-initialize any scripts that depend on DOM
          console.log('All sections loaded');
          
          // Dispatch custom event so scripts.js knows DOM is ready
          window.dispatchEvent(new CustomEvent('sectionsLoaded'));
        });
    });
  </script>

  <!-- Google Maps -->
  <!-- Google Maps JavaScript API -->
<script>
  // Global map init function — checks if container exists
  window.initFoodMap = function() {
    const mapEl = document.getElementById('foodMap');

      console.log('Map container not ready yet, will retry...');
      return false; // Signal that it didn't initialize

    const valenzuela = { lat: 14.7010, lng: 120.9840 };

    const map = new google.maps.Map(mapEl, {
      zoom: 14,
      center: valenzuela,
      mapTypeId: 'roadmap',
      styles: [
        { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
        { featureType: 'transit', elementType: 'labels', stylers: [{ visibility: 'off' }] }
      ]
    });

    // Food company locations
    const companies = [
      { name: 'Newton Food Products Mfg.', address: '84 Ramon Delfin St, Marulas, Valenzuela', lat: 14.6850, lng: 120.9820 },
      { name: 'M&T Food Industries', address: '136 Kabatuhan Rd, Valenzuela', lat: 14.7100, lng: 120.9750 },
      { name: 'Ecco Food Corporation', address: '262 Urrutia, Valenzuela', lat: 14.7050, lng: 120.9900 },
      { name: 'Lembest Foods Corporation', address: '2069 Kadon, Valenzuela', lat: 14.7150, lng: 120.9800 },
      { name: 'Go Tian Food Industries', address: '161 A. Mariano, Valenzuela', lat: 14.6950, lng: 120.9850 },
      { name: 'MGP Food Products', address: '80 Padrigal St, Valenzuela', lat: 14.7000, lng: 120.9780 },
      { name: 'Prime Supreme King Company', address: '940 Sta. Monica St, Valenzuela', lat: 14.7080, lng: 120.9720 },
      { name: 'Pure Snack Food House', address: '59 ITC Comp. Rd, Valenzuela', lat: 14.6900, lng: 120.9880 },
      { name: 'Hoc Guan Manufacturing', address: '130 Marcelo H. Del Pilar St, Malabon', lat: 14.6650, lng: 120.9700 },
      { name: 'CDO Foodsphere', address: '560 W Service Rd, Valenzuela', lat: 14.7200, lng: 120.9950 },
      { name: 'Josie Food Industry', address: '6011 A. Del Mundo St, Valenzuela', lat: 14.6920, lng: 120.9830 },
      { name: 'Newborn Food Products Inc.', address: 'Serafia St, Balubaran, Valenzuela', lat: 14.6880, lng: 120.9790 },
      { name: 'Silver Swan Manufacturing', address: '164 Panghulo Rd, Malabon', lat: 14.6600, lng: 120.9650 },
      { name: 'MCT Food Inc.', address: '168 Alicia, Fortune Village, Valenzuela', lat: 14.7050, lng: 120.9850 },
      { name: 'CBY Foods', address: '8 Dalisay St, Serrano Subdivision, Valenzuela', lat: 14.6980, lng: 120.9810 },
      { name: 'Santory', address: '8 M. Antonio, Valenzuela', lat: 14.7020, lng: 120.9770 },
      { name: 'Donutification Corporation', address: '888 East Cantillion, Valenzuela', lat: 14.6960, lng: 120.9870 },
      { name: 'Greenbelt Food Products', address: '383 C. Santiago St, Valenzuela', lat: 14.7120, lng: 120.9730 },
      { name: 'Sionci Bihon Factory', address: '67 A. Marcelo St, Valenzuela', lat: 14.6940, lng: 120.9840 },
      { name: 'Centrum Enterprise', address: '47 Maysan Rd, Valenzuela', lat: 14.6800, lng: 120.9860 }
    ];

    // PLV location
    const plv = { lat: 14.7010, lng: 120.9840 };

    // Add PLV marker (blue)
    new google.maps.Marker({
      position: plv,
      map: map,
      title: 'Pamantasang Lungsod ng Valenzuela',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: '#2563eb',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2
      }
    });

    // Add company markers
    companies.forEach(company => {
      const marker = new google.maps.Marker({
        position: { lat: company.lat, lng: company.lng },
        map: map,
        title: company.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: '#e07b3a',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 2
        }
      });

      const infoWindow = new google.maps.InfoWindow({
        content: '<div style="padding:8px;font-family:DM Sans,sans-serif;max-width:220px;"><strong style="color:#e07b3a;">' + company.name + '</strong><br><span style="color:#666;font-size:0.85rem;">' + company.address + '</span></div>'
      });

      marker.addListener('click', () => {
        infoWindow.open(map, marker);
      });
    });

    // Fit bounds
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(plv);
    companies.forEach(c => bounds.extend(new google.maps.LatLng(c.lat, c.lng)));
    map.fitBounds(bounds);

    return true; // Signal success
  };
</script>

<!-- Load Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB8rUpk63_RlZPGfPLc08EaV29AsQ3bbQM&loading=async&callback=initFoodMap" async></script>

</html>
